# Rust SDK publish — tag-driven crates.io publish via Trusted Publishing / OIDC (cycle 177).
# Push a bare semver tag (e.g. `0.9.1`) → clippy/test gate → `cargo publish`.
#
# Auth = crates.io Trusted Publishing (OIDC) — NO long-lived CARGO_REGISTRY_TOKEN.
# rust-lang/crates-io-auth-action exchanges the GitHub id-token for a short-lived crates.io token.
# One-time maintainer setup: crates.io → the `knishio-client` crate → Settings → Trusted Publishing →
#   add GitHub Actions: owner `WishKnish`, repository `KnishIO-Client-Rust`, workflow `publish.yml`.
#   (The crate's first release was published manually, which trusted publishing requires.)
name: Publish

on:
  push:
    tags:
      - '[0-9]*'

permissions:
  id-token: write   # OIDC for crates.io Trusted Publishing
  contents: write   # create the GitHub Release

jobs:
  publish:
    name: build, test, publish to crates.io (Trusted Publishing)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain (stable + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # Gate — never publish a tag that doesn't lint/build/test clean.
      - name: cargo clippy (lint gate)
        run: cargo clippy --all-targets

      - name: cargo test
        run: cargo test

      # OIDC: exchange the GitHub id-token for a short-lived crates.io token (no stored secret).
      - name: Authenticate to crates.io (Trusted Publishing)
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      # cargo publish re-verifies the package builds from the packaged sources before upload.
      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
