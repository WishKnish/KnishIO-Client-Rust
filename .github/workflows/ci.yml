# Rust SDK CI — enforces the clippy gate (cycle 111; Cargo.toml [lints.clippy] all = deny).
# Born-enforced: the repo had no CI, so the gate was local-only/bypassable until now.
name: CI

on: [push, pull_request]

jobs:
  clippy:
    name: clippy (lint gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain (stable + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # The c111 gate: clippy::all is deny-clean. NOT `-D warnings` — unwrap/expect/panic
      # are intentionally warn-level (a separate gradual-elimination effort), so promoting
      # warnings to errors would fail the build on those non-bug lints.
      # No `--locked`: Cargo.lock is gitignored (not committed), so `--locked` errors
      # "cannot create the lock file"; the gate is clippy lints, not lockfile reproducibility.
      - name: cargo clippy
        run: cargo clippy --all-targets

  audit:
    name: cargo audit (dependency advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      # Cargo.lock is gitignored — resolve fresh (what consumers get), then audit
      # that resolved graph against the RUSTSEC advisory database.
      - name: Generate lockfile
        run: cargo generate-lockfile

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: cargo audit
        run: cargo audit
